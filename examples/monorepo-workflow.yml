# Example workflow for a monorepo using Python Nurse
# Copy this to your repo: .github/workflows/python-nurse.yml
#
# Replace OWNER/python-nurse with your published action (e.g. seanfroning/python-nurse@v1)
# or use @main for development before publishing a release.
#
# Score presets: balanced (default), structure (Vulture/Radon/Bandit heavy), quality (Ruff/SQLFluff/MarkdownLint heavy)
# PR comments include nurse reaction images (auto-resolved from the action repo; set images-base-url when forking).

name: Python Nurse

on:
  pull_request:
    branches: [staging, main]
    paths:
      - "apps/worker/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      worker_changed: ${{ steps.filter.outputs.worker_changed }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker_changed:
              - 'apps/worker/**'

  python-nurse:
    needs: changes
    if: needs.changes.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run Python Nurse
        id: nurse
        uses: OWNER/python-nurse@v1
        with:
          app-path: apps/worker
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # score-preset: balanced | structure | quality
          score-preset: balanced
          # images-base-url: optional; auto-resolves from the action repo; set when forking:
          # images-base-url: "https://raw.githubusercontent.com/YOUR_ORG/python-nurse/main/assets/nurses"

      - name: Print score
        if: always()
        run: echo "Health score ${{ steps.nurse.outputs.score }}/100"
